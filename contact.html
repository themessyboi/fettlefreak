    <div class="container d-flex justify-content-center text-align-center">
        <h1>Contact Us</h1>
    </div>

    <div class="container d-flex justify-content-center text-align-center">
        <p>Fill out the form below</p>
    </div>


    <div class="container form-text">
        <form>
            <div class="row">
                <div class="col">
                    <input type="text" class="form-control" placeholder="First name" aria-label="First name">
                </div>
                <div class="col">
                    <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
                </div>
            </div>
            <div class="col-12 my-4">
                <input type="text" class="form-control" id="inputAddress" placeholder="Age">
            </div>

            <select class="form-select my-4" aria-label="Default select example">
                <option selected>Select your plan</option>
                <option value="1">Free <em>(for new members only)</em></option>
                <option value="2">Weight Gain</option>
                <option value="3">Weight Loss</option>
                <option value="4">Maintain Plan</option>
                <option value="5">Customized</option>
            </select>

            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Elaborate if you have any
                    disease/allergy</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>
        </form>

    </div>
